<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anubhav Ruler 👑 | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta property="og:title" content="Anubhav Ruler 👑">
    <meta property="og:description" content="OXIE 1845639613 | Radhe Radhe">
    <meta property="og:url" content="https://harswardhan.github.io/anubhav-jha/">
    <meta name="theme-color" content="#764ba2">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&family=Rajdhani:wght@500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            min-height: 100vh;
        }
        
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .welcome-screen.hidden { display: none; }
        
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, #FF8C00 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #8B008B 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, #4169E1 0%, transparent 50%);
            animation: move 15s infinite alternate;
        }
        
        @keyframes move {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.2) rotate(10deg); }
        }
        
        .welcome-box {
            background: rgba(0,0,0,0.6);
            padding: 35px 25px;
            border-radius: 30px;
            max-width: 550px;
            margin: 20px;
            box-shadow: 0 0 60px rgba(255,215,0,0.3);
            backdrop-filter: blur(20px);
            border: 3px solid rgba(255,215,0,0.4);
            position: relative;
            z-index: 1;
            animation: popUp 0.8s ease-out;
        }
        
        @keyframes popUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .deity-images {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .deity {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            box-shadow: 0 0 25px #FFD700;
            animation: float 3s infinite ease-in-out;
            object-fit: cover;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
        }
        
        .deity:nth-child(2) { animation-delay: 0.5s; }
        .deity:nth-child(3) { animation-delay: 1s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        .mantra {
            font-family: 'Tiro Devanagari Sanskrit', serif;
            font-size: 1.8rem;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
            margin: 12px 0;
            line-height: 1.4;
        }
        
        .swagat-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            margin: 20px 0;
            color: #fff;
            font-weight: 500;
        }
        
        .enter-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 5px 25px rgba(255,215,0,0.5);
            border: none;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
        }
        
        .enter-btn:hover {
            transform: scale(1.15) translateY(-3px);
            box-shadow: 0 8px 35px rgba(255,215,0,0.8);
        }
        
        .main-site {
            padding: 50px 20px;
            min-height: 100vh;
            animation: fadeIn 1.5s;
            display: none;
        }
        
        .main-site.show { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .box {
            background: rgba(0,0,0,0.3);
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.2rem; 
            margin: 0 0 10px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            word-break: break-word;
        }
        
        .typing {
            border-right: 3px solid #fff;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(13), blink .5s step-end infinite alternate;
            margin: 0 auto;
            display: inline-block;
            max-width: 100%;
        }
        
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }
        
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .btn {
            display: inline-block;
            margin: 15px 8px 0 8px;
            padding: 15px 25px;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .music-btn {
            background: #FFD700;
            color: #000;
        }
        
        .music-btn.active {
            background: #00ff88;
            box-shadow: 0 0 20px #00ff88;
        }
        
        .socials {
            margin-top: 25px;
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .socials a {
            font-size: 45px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px #ff00ff);
            line-height: 1;
        }
        
        .socials a:hover { 
            transform: scale(1.4) rotate(10deg); 
            color: #00ffff; 
        }
        
        .socials .fa-instagram:hover {
            color: #E1306C;
        }
        
        footer {
            margin-top: 30px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .typing { font-size: 1.8rem; }
            .btn { padding: 12px 18px; font-size: 0.85rem; margin: 10px 5px 0 5px; }
            .socials a { font-size: 38px; }
            .box { padding: 25px 15px; }
            .mantra { font-size: 1.4rem; }
            .swagat-text { font-size: 1.1rem; }
            .deity { width: 75px; height: 75px; font-size: 35px; }
            .welcome-box { padding: 25px 15px; }
        }
    </style>
</head>
<body>
    <div class="welcome-screen" id="welcomeScreen">
        <div class="bg-animation"></div>
        <div class="welcome-box">
            <div class="deity-images">
                <div class="deity">🕉️</div>
                <div class="deity">🦚</div>
                <div class="deity">🌸</div>
            </div>
            
            <div class="mantra">ॐ गं गणपतये नमः</div>
            <div class="mantra">जय श्री राधे कृष्ण</div>
            
            <div class="swagat-text">
                OXIE 1845639613 की वेबसाइट पे<br>
                आपका हार्दिक स्वागत है 🙏
            </div>
            
            <button class="enter-btn" onclick="enterSite()">Click Here - प्रवेश करें 👑</button>
        </div>
    </div>

    <div class="main-site" id="mainSite">
        <div class="box">
            <h1 class="typing">Anubhav Ruler 👑</h1>
            <p>OXIE 1845639613</p>
            <p>Ye hai meri official website</p>
            
            <button class="btn music-btn" id="sanwaliBtn" onclick="playSong('sanwali')">🔊 Sanwali</button>
            <button class="btn music-btn" id="radheBtn" onclick="playSong('radhe')">🎵 RADHE Radhe</button>
            <button class="btn" id="playPauseBtn" onclick="togglePlayPause()">⏸️ Pause</button>
            <br>
            
            <div class="socials">
                <a href="https://instagram.com/oxie_45" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://instagram.com/anubhavjha.45" target="_blank">
                    <i class="fas fa-fire"></i>
                </a>
            </div>
            
            <audio id="sanwaliMusic" loop>
                <source src="Sanwali_Surat_pe_dil_Mohan(128k).mp3" type="audio/mpeg">
            </audio>
            
            <audio id="radheMusic" loop>
                <source src="Radhe Radhe.mp3" type="audio/mpeg">
            </audio>
        </div>
        
        <footer>Made by OXIE Bhaiya</footer>
    </div>

    <script>
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainSite = document.getElementById('mainSite');
        const sanwaliMusic = document.getElementById('sanwaliMusic');
        const radheMusic = document.getElementById('radheMusic');
        const sanwaliBtn = document.getElementById('sanwaliBtn');
        const radheBtn = document.getElementById('radheBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        
        let currentSong = 'sanwali';
        let isPlaying = false;
        
        function enterSite() {
            welcomeScreen.classList.add('hidden');
            mainSite.classList.add('show');
            playSong('sanwali');
        }
        
        function playSong(song) {
            sanwaliMusic.pause();
            radheMusic.pause();
            sanwaliBtn.classList.remove('active');
            radheBtn.classList.remove('active');
            
            currentSong = song;
            
            if (song === 'sanwali') {
                sanwaliMusic.play();
                sanwaliBtn.classList.add('active');
            } else if (song === 'radhe') {
                radheMusic.play();
                radheBtn.classList.add('active');
            }
            
            isPlaying = true;
            playPauseBtn.innerText = '⏸️ Pause';
        }
        
        function togglePlayPause() {
            if (isPlaying) {
                // Pause kar
                sanwaliMusic.pause();
                radheMusic.pause();
                playPauseBtn.innerText = '▶️ Play';
                isPlaying = false;
            } else {
                // Resume kar - jo last song tha wahi bajega
                if (currentSong === 'sanwali') {
                    sanwaliMusic.play();
                    sanwaliBtn.classList.add('active');
                } else {
                    radheMusic.play();
                    radheBtn.classList.add('active');
                }
                playPauseBtn.innerText = '⏸️ Pause';
                isPlaying = true;
            }
        }
    </script>
</body>
</html>
