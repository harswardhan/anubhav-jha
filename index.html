<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anubhav Ruler 👑 | Official</title>
    
    <!-- Social Share Preview -->
    <meta property="og:title" content="Anubhav Ruler 👑">
    <meta property="og:description" content="OXIE 1845639613 | Radhe Radhe">
    <meta property="og:url" content="https://harswardhan.github.io/anubhav-jha/">
    <meta name="theme-color" content="#764ba2">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
            animation: fadeIn 1.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .box {
            background: rgba(0,0,0,0.3);
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.2rem; 
            margin: 0 0 10px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            word-break: break-word;
        }
        /* Typing Effect */
        .typing {
            border-right: 3px solid #fff;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(13), blink .5s step-end infinite alternate;
            margin: 0 auto;
            display: inline-block;
            max-width: 100%;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }
        
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            margin: 15px 10px 0 10px;
            padding: 15px 30px;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .music-btn {
            background: #FFD700;
            color: #000;
        }
        /* Social Icons */
        .socials {
            margin-top: 25px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .socials a {
            font-size: 40px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px #ff00ff);
            line-height: 1;
        }
        .socials a:hover { 
            transform: scale(1.4) rotate(10deg); 
            color: #00ffff; 
        }
        footer {
            margin-top: 30px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* Mobile ke liye fix */
        @media (max-width: 480px) {
            body { padding: 30px 15px; }
            h1 { font-size: 1.8rem; }
            .typing { font-size: 1.8rem; }
            .btn { padding: 12px 20px; font-size: 0.9rem; }
            .socials a { font-size: 35px; }
            .box { padding: 25px 15px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1 class="typing">Anubhav Ruler 👑</h1>
        <p>OXIE 1845639613</p>
        <p>Ye hai meri official website</p>
        
        <button class="btn music-btn" onclick="toggleMusic()">🔊 Play RADHE Radhe</button>
        <br>
        
        <div class="socials">
            <a href="https://instagram.com/oxie_45" target="_blank">🔥</a>
            <a href="https://instagram.com/anubhavjha.45" target="_blank">📱</a>
        </div>
        
        <audio id="rulerMusic" loop>
            <source src="Radhe Radhe.mp3" type="audio/mpeg">
        </audio>
    </div>
    
    <footer>Made by Ruler with 🔥</footer>

    <script>
        const music = document.getElementById('rulerMusic');
        const musicBtn = document.querySelector('.music-btn');
        
        document.addEventListener('click', function() {
            music.play();
            musicBtn.innerText = '⏸️ Pause RADHE Radhe';
        }, { once: true });
        
        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.innerText = '⏸️ Pause RADHE Radhe';
            } else {
                music.pause();
                musicBtn.innerText = '🔊 Play RADHE Radhe';
            }
        }
    </script>
</body>
</html>
